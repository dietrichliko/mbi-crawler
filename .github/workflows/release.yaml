name: Release

on:
  push:
    tags:
      - "v*"

# Permissions needed for GitHub Releases and GHCR.
permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Build, publish, and containerise
    runs-on: ubuntu-latest

    steps:
      # Full history is required by git-cliff to generate an accurate changelog.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # ── Python package ──────────────────────────────────────────────────────

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Build wheel and sdist
        run: uv build

      # ── Release notes (current tag only, header stripped) ──────────────────

      - name: Generate release notes
        uses: orhun/git-cliff-action@v4
        id: cliff
        with:
          config: cliff.toml
          args: --current --strip header
        env:
          OUTPUT: release-notes.md
          GITHUB_REPO: ${{ github.repository }}

      # ── GitHub Release with wheel attached ─────────────────────────────────

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: dist/*
          fail_on_unmatched_files: true

      # ── Docker image → GHCR ────────────────────────────────────────────────

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Layer cache speeds up repeated builds significantly.
          cache-from: type=gha
          cache-to: type=gha,mode=max
