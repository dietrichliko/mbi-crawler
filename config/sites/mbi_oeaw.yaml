# MBI subsite of the Austrian Academy of Sciences.
# Uses the oeaw.ac.at sitemap to discover URLs, then filters to /mbi/ paths.

name: mbi_oeaw
enabled: true
crawler_type: oeaw
base_url: https://www.oeaw.ac.at/mbi

# Full sitemap of the parent site; OEAW crawler will filter it down to MBI pages.
# MBI is not indexed in the parent sitemap; use BFS link-following instead.
sitemap_url: null

filters:
  # Restrict to MBI subpath (full URL match via fnmatch).
  include_patterns:
    - "https://www.oeaw.ac.at/mbi*"
  # Skip WordPress infrastructure paths.
  exclude_patterns:
    - "*/wp-json/*"
    - "*/feed/*"
    - "*/wp-admin/*"
  strip_query_params: true
  max_depth: 10

rate_limit:
  delay: 1.5          # seconds between requests per concurrent slot
  max_concurrent: 2

output_subdir: mbi_oeaw

extra:
  # Target only the main content column; drops header nav, sidebar, footer,
  # and the cookieman cookie-consent modal automatically.
  css_selector: "#col-content"
  # Strip remaining chrome inside the content column.
  excluded_selector: "nav, .content-header, .tx-oeawtheme-sharing"
  # Staff pages have very short content blocks (name, experiment, email).
  word_count_threshold: 0
  # Notes for manual tuning:
  # - If oeaw.ac.at adds sitemap sub-indexes, they are followed automatically.
  # - Set include_patterns to [] to crawl the entire oeaw.ac.at (slow).
